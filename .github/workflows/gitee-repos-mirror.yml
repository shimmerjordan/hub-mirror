name: Gitee repos mirror

# 单向同步：GitHub -> Gitee
on:
  # 每次向本仓库 push 时触发
  push:
  # 手动触发
  workflow_dispatch:
  # 定时触发：每天北京时间 09:00（UTC 01:00）
  schedule:
    - cron: '0 1 * * *'

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Get time
        id: get-time
        shell: bash
        run: echo "date=$(/bin/date -u '+%Y%m%d%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Cache src repos
        uses: actions/cache@v4
        id: cache
        with:
          path: ${{ github.workspace }}/hub-mirror-cache
          key: ${{ runner.os }}-hub-repos-cache-${{ steps.get-time.outputs.date }}
          restore-keys: ${{ runner.os }}-hub-repos-cache

      - name: Mirror GitHub to Gitee
        uses: ./
        with:
          src: github/shimmerjordan
          dst: gitee/shimmerjordan
          # 列举源仓库时使用，避免未认证的 GitHub API 速率限制（push 频繁触发时尤为重要）
          src_token: ${{ secrets.GITHUB_TOKEN }}
          # Gitee 公钥对应的私钥：https://gitee.com/profile/sshkeys
          dst_key: ${{ secrets.GITEE_PRIVATE_KEY }}
          # Gitee 用于创建仓库的 token：https://gitee.com/profile/personal_access_tokens
          dst_token: ${{ secrets.GITEE_TOKEN }}
          cache_path: /github/workspace/hub-mirror-cache
          # white_list: 'hub-mirror, hexo-migrator-github-issue'
          force_update: true

      - name: Print cache path
        run: ls -la ${{ github.workspace }}/hub-mirror-cache
